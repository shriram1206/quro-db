spring.application.name=quro
# H2 In-Memory Database (for testing without MySQL)
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# MySQL Configuration (comment out when using H2)
spring.datasource.url=jdbc:mysql://localhost:3306/quro_db
spring.datasource.username=root
spring.datasource.password=Quro@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# Database Initialization (loads schema.sql and data.sql automatically)
spring.sql.init.mode=always

# Server Configuration
server.port=8081

# Demo Mode (set to true to bypass API calls for testing)
demo.mode=true

# Load environment variables (from .env file if present)
spring.config.import=optional:file:.env[.properties]

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://models.github.ai/inference
openai.model=gpt-4o